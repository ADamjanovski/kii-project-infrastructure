# Assumption: the grouped AWS Secrets Manager secret prod/ecommerce/my-secrets contains the backend keys as top-level JSON properties.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: backend-secrets
  namespace: ecommerce
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager
  target:
    name: backend-secrets
    creationPolicy: Owner
  data:
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: prod/ecommerce/my-secrets
        property: GEMINI_API_KEY
    - secretKey: JWT_SECRET
      remoteRef:
        key: prod/ecommerce/my-secrets
        property: JWT_SECRET
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: prod/ecommerce/my-secrets
        property: POSTGRES_PASSWORD
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: prod/ecommerce/my-secrets
        property: REDIS_PASSWORD
