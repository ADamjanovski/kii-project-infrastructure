# Assumption: External Secrets Operator runs on a self-managed Kubernetes cluster on EC2 and uses the EC2 instance role to access AWS Secrets Manager for multiple namespaces.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-central-1
