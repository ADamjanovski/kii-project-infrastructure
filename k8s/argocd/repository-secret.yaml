# Assumption: the AWS Secrets Manager secret prod/ecommerce/my-secrets contains a GITHUB_TOKEN property with the GitHub personal access token used by Argo CD for Git write-back.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ecommerce-repo
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager
  target:
    name: ecommerce-repo
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: git
        url: https://github.com/ADamjanovski/kii-project-infrastructure.git
        username: ADamjanovski
        password: "{{ .password }}"

  data:
    - secretKey: password
      remoteRef:
        key: prod/ecommerce/my-secrets
        property: GITHUB_TOKEN
