apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ecommerce-repo
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager
  target:
    name: ecommerce-repo
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: git
        url: {{ .Values.global.infrastructureRepoUrl | quote }}
        username: ADamjanovski
        password: "{{ `{{ .password }}` }}"
  data:
    - secretKey: password
      remoteRef:
        key: {{ .Values.global.awsSecretName }}
        property: GITHUB_TOKEN
