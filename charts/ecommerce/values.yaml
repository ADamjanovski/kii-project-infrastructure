# Assumption: the ecommerce Helm chart is deployed by Argo CD into the ecommerce namespace and the ExternalSecret-generated Secrets already exist there.
backend:
  replicaCount: 3
  image:
    repository: adamjanovski/ecommerce-backend
    tag: "0ed90dffdc93dc788a638dd17b76afc68ec8bae9"
    pullPolicy: Always
  service:
    port: 8080

frontend:
  replicaCount: 3
  image:
    repository: adamjanovski/ecommerce-frontend
    tag: "0ed90dffdc93dc788a638dd17b76afc68ec8bae9"
    pullPolicy: Always
  service:
    port: 80

redis:
  enabled: true
  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent
  service:
    port: 6379
  persistence:
    size: 1Gi

config:
  backend:
    springProfilesActive: dev
    springApplicationName: backend
    springCacheType: redis
    postgresHost: postgres-primary
    postgresPort: "5432"
    redisHost: redis
    redisPort: "6379"
    geminiApiUrl: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent
  frontend:
    viteApiUrl: https://ecommerce.local/api

ingress:
  enabled: true
  className: traefik
  host: ecommerce.local
  tlsSecretName: ecommerce-tls
